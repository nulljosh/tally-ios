<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" fill="#f5f5f7" stroke="#d1d5db" stroke-width="1"/>
  <!-- Phone frame -->
  <rect x="60" y="35" width="80" height="130" rx="12" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.6"/>
  <rect x="85" y="40" width="30" height="4" rx="2" fill="#2563eb" opacity="0.3"/>
  <!-- Bar chart inside phone -->
  <rect x="75" y="100" width="10" height="30" rx="2" fill="#2563eb" opacity="0.4"/>
  <rect x="90" y="85" width="10" height="45" rx="2" fill="#2563eb" opacity="0.5"/>
  <rect x="105" y="75" width="10" height="55" rx="2" fill="#2563eb" opacity="0.6"/>
  <rect x="120" y="90" width="10" height="40" rx="2" fill="#2563eb" opacity="0.5"/>
  <!-- Trend line -->
  <polyline points="80,95 95,80 110,70 125,82" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.4"/>
  <!-- Dollar sign accent -->
  <text x="100" y="72" font-family="-apple-system, sans-serif" font-size="14" fill="#2563eb" text-anchor="middle" opacity="0.4">$</text>
</svg>
